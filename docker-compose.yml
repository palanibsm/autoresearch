version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: banking_db_optimizer
    environment:
      POSTGRES_DB: banking_db
      POSTGRES_USER: banking_user
      POSTGRES_PASSWORD: banking_pass
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=100"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - banking_network

volumes:
  postgres_data:

networks:
  banking_network:
    driver: bridge
